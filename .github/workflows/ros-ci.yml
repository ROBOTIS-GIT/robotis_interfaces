name: CI

on:
  push:
    branches: [jazzy, main]
  pull_request:
    branches: [jazzy, main]

jobs:
  ros_ci:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
    steps:
      - name: Setup workspace
        run: mkdir -p ros_ws/src/robotis_interfaces

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ros_ws/src/robotis_interfaces

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Check and install ROS dependencies
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -y -r --rosdistro jazzy
          rosdep check --from-paths ros_ws/src --ignore-src --rosdistro jazzy

      - name: Build package
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          colcon build \
            --packages-up-to robotis_interfaces \
            --event-handlers=console_cohesion+
